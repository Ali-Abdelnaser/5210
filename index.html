<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Two Ten | Social Links</title>
    <meta name="description" content="Connect with Five Two Ten on all social media platforms. Stay updated with our latest content on YouTube, Facebook, Instagram, and TikTok.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="logo-wrapper">
                <img src="https://i.ibb.co/2389wHYB/app-logo.png" alt="Five Two Ten Logo" class="logo" id="main-logo">
            </div>
            <h1 class="brand-name">Five Two Ten</h1>
            <p class="tagline">Follow our journey across the web</p>
        </header>

        <section class="links-section">
            <a href="https://www.youtube.com/@Fivetwoten-eg" target="_blank" class="link-card youtube" id="youtube-link">
                <div class="icon-box">
                    <i class="fab fa-youtube"></i>
                </div>
                <div class="content-box">
                    <span class="platform-name">YouTube</span>
                    <span class="username">@Fivetwoten-eg</span>
                </div>
                <div class="arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <a href="https://www.facebook.com/share/14Up9sdE57q/?mibextid=wwXIfr" target="_blank" class="link-card facebook" id="facebook-link">
                <div class="icon-box">
                    <i class="fab fa-facebook-f"></i>
                </div>
                <div class="content-box">
                    <span class="platform-name">Facebook</span>
                    <span class="username">Five Two Ten</span>
                </div>
                <div class="arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <a href="https://www.instagram.com/five.two.ten?igsh=MTB4c2UwMzBobnM1dQ%3D%3D&utm_source=qr" target="_blank" class="link-card instagram" id="instagram-link">
                <div class="icon-box">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="content-box">
                    <span class="platform-name">Instagram</span>
                    <span class="username">@five.two.ten</span>
                </div>
                <div class="arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <a href="https://www.tiktok.com/@five.two.ten?_r=1&_t=ZS-93fsYSupnI0" target="_blank" class="link-card tiktok" id="tiktok-link">
                <div class="icon-box">
                    <i class="fab fa-tiktok"></i>
                </div>
                <div class="content-box">
                    <span class="platform-name">TikTok</span>
                    <span class="username">@five.two.ten</span>
                </div>
                <div class="arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>
        </section>

        <footer class="footer">
            <p>&copy; 2026 Five Two Ten. All rights reserved.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
